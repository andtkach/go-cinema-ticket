services:
  redis-app:
    container_name: redis-app
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - ./data/redis-app:/data
      - ./config/redis/users.acl:/etc/redis/users.acl:ro
    command: >
      redis-server
      --aclfile /etc/redis/users.acl
      --save 60 1
      --save 300 10
      --save 900 100
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel notice
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -p 6379 --user redis -a redis --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-app:
    container_name: postgres-app
    image: postgres:17-alpine
    restart: unless-stopped
    shm_size: 128mb
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - ./data/postgres-app:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-cinema}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=C
      - PGDATA=/var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=100
      -c effective_cache_size=256MB
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c timezone=UTC
      -c log_timezone=UTC
      -c log_min_duration_statement=1000
      -c log_connections=on
      -c log_disconnections=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    stop_grace_period: 60s

  nginx-app:
    container_name: nginx-app
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:17091:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis-commander:
    container_name: redis-commander
    hostname: redis-commander
    image: ghcr.io/joeferner/redis-commander:latest
    restart: unless-stopped
    depends_on:
      redis-app:
        condition: service_healthy
    environment:
      - REDIS_HOSTS=local:redis-app:16379:0:redis
      # redis-commander connects to the internal Docker network port, not the host port
      - REDIS_USERNAME=redis
      - REDIS_PASSWORD=redis
    ports:
      - "127.0.0.1:16378:8081"
    user: redis
