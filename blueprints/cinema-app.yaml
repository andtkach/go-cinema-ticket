version: 1
metadata:
  name: Cinema App Setup
  labels:
    blueprints.goauthentik.io/description: >-
      Creates cinema-admins and cinema-clients groups, a groups scope mapping,
      the cinema-provider OAuth2/OIDC provider, and the cinema-app application.

entries:
  # ── Groups ────────────────────────────────────────────────────────────────

  - model: authentik_core.group
    state: present
    identifiers:
      name: cinema-admins
    attrs:
      name: cinema-admins

  - model: authentik_core.group
    state: present
    identifiers:
      name: cinema-clients
    attrs:
      name: cinema-clients

  - model: authentik_core.group
    state: present
    identifiers:
      name: cinema-global-admins
    attrs:
      name: cinema-global-admins
      is_superuser: true

  # ── Users ─────────────────────────────────────────────────────────────────

  - model: authentik_core.user
    state: present
    identifiers:
      username: admin
    attrs:
      username: admin
      name: admin
      email: admin@localhost
      path: users
      is_active: true
      password: "P@ssw0rd"
      groups:
        - !Find [authentik_core.group, [name, cinema-global-admins]]

  - model: authentik_core.user
    state: present
    identifiers:
      username: scrooge
    attrs:
      username: scrooge
      name: scrooge
      email: scrooge@localhost
      path: users
      is_active: true
      password: "P@ssw0rd"
      groups:
        - !Find [authentik_core.group, [name, cinema-admins]]

  - model: authentik_core.user
    state: present
    identifiers:
      username: donald
    attrs:
      username: donald
      name: donald
      email: donald@localhost
      path: users
      is_active: true
      password: "P@ssw0rd"
      groups:
        - !Find [authentik_core.group, [name, cinema-admins]]

  - model: authentik_core.user
    state: present
    identifiers:
      username: huey
    attrs:
      username: huey
      name: huey
      email: huey@localhost
      path: users
      is_active: true
      password: "P@ssw0rd"
      groups:
        - !Find [authentik_core.group, [name, cinema-clients]]

  - model: authentik_core.user
    state: present
    identifiers:
      username: dewey
    attrs:
      username: dewey
      name: dewey
      email: dewey@localhost
      path: users
      is_active: true
      password: "P@ssw0rd"
      groups:
        - !Find [authentik_core.group, [name, cinema-clients]]

  - model: authentik_core.user
    state: present
    identifiers:
      username: louie
    attrs:
      username: louie
      name: louie
      email: louie@localhost
      path: users
      is_active: true
      password: "P@ssw0rd"
      groups:
        - !Find [authentik_core.group, [name, cinema-clients]]

  # ── Groups scope mapping ───────────────────────────────────────────────────

  - model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      name: cinema-groups
    attrs:
      name: cinema-groups
      scope_name: groups
      expression: |
        return {"groups": [g.name for g in request.user.ak_groups.all()]}

  # ── OAuth2/OIDC provider ───────────────────────────────────────────────────

  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: cinema-provider
    attrs:
      name: cinema-provider
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: public
      client_id: "ZJ4Pj14kxLyA5sYlI1OuznYpjZsHvdOcaJ1yWgJp"
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      redirect_uris:
        - matching_mode: strict
          url: "https://localhost:17091/app/callback"
        - matching_mode: strict
          url: "http://localhost:17070/callback"
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-email"]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, cinema-groups]]

  # ── Application ───────────────────────────────────────────────────────────

  - model: authentik_core.application
    state: present
    identifiers:
      slug: cinema-app
    attrs:
      name: Cinema App
      slug: cinema-app
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, cinema-provider]]
